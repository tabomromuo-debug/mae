<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050508">
    <meta name="mobile-web-app-capable" content="yes">
    <title>ROBO FACE</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            -webkit-user-select: none; user-select: none;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #050508;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* ===== FULLSCREEN REACTION OVERLAY ===== */
        .reaction-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .reaction-overlay.active {
            display: flex;
            opacity: 1;
        }

        .reaction-shock {
            background: radial-gradient(circle, rgba(255,50,50,0.12), rgba(10,0,0,0.95));
        }
        .reaction-shock .reaction-emoji {
            font-size: 100px;
            animation: shock-bounce 0.6s ease-in-out infinite alternate;
            text-shadow: 0 0 50px rgba(255,50,50,0.7);
        }
        @keyframes shock-bounce {
            0% { transform: scale(1) rotate(-3deg); }
            100% { transform: scale(1.12) rotate(3deg); }
        }

        .reaction-celebrate {
            background: radial-gradient(circle, rgba(255,200,50,0.08), rgba(10,10,0,0.95));
        }
        .reaction-celebrate .reaction-emoji {
            font-size: 90px;
            animation: celebrate-wiggle 0.8s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255,200,50,0.6);
        }
        @keyframes celebrate-wiggle {
            0%, 100% { transform: rotate(-8deg) scale(1); }
            50% { transform: rotate(8deg) scale(1.08); }
        }

        .reaction-love {
            background: radial-gradient(circle, rgba(255,50,150,0.08), rgba(15,0,8,0.95));
        }
        .reaction-love .reaction-emoji {
            font-size: 90px;
            animation: love-pulse 0.9s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255,50,150,0.6);
        }
        @keyframes love-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .reaction-scared {
            background: radial-gradient(circle, rgba(100,0,200,0.1), rgba(8,0,15,0.95));
        }
        .reaction-scared .reaction-emoji {
            font-size: 95px;
            animation: scared-shake 0.25s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(150,0,255,0.5);
        }
        @keyframes scared-shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-4px, 2px); }
            50% { transform: translate(4px, -2px); }
            75% { transform: translate(-2px, -3px); }
        }

        .reaction-sleep {
            background: radial-gradient(circle, rgba(50,80,150,0.1), rgba(0,0,15,0.95));
        }
        .reaction-sleep .reaction-emoji {
            font-size: 80px;
            animation: sleep-float 2.5s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(100,150,255,0.5);
        }
        @keyframes sleep-float {
            0%, 100% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(-15px); opacity: 1; }
        }

        .zzz {
            position: absolute;
            font-size: 35px;
            color: rgba(150,180,255,0.5);
            text-shadow: 0 0 15px rgba(150,180,255,0.3);
            animation: zzz-up 3s ease-out infinite;
            pointer-events: none;
        }
        .zzz:nth-child(1) { left: 25%; top: 35%; animation-delay: 0s; font-size: 28px; }
        .zzz:nth-child(2) { left: 65%; top: 30%; animation-delay: 1s; font-size: 32px; }
        .zzz:nth-child(3) { left: 45%; top: 25%; animation-delay: 2s; font-size: 24px; }
        @keyframes zzz-up {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            15% { opacity: 0.8; }
            100% { transform: translateY(-70px) translateX(25px); opacity: 0; }
        }

        .reaction-text {
            margin-top: 25px;
            font-size: 16px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            text-shadow: 0 0 15px rgba(255,255,255,0.15);
        }

        /* Confetti */
        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 201;
            display: none;
        }

        /* Scanlines & vignette */
        .scanlines {
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px);
            pointer-events: none; z-index: 100; opacity: 0.18;
        }
        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 50% 45%, transparent 15%, rgba(0,0,0,0.92) 100%);
            pointer-events: none; z-index: 99;
        }
        .ambient-glow {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 200px;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(0,200,255,0.025), transparent 70%);
            pointer-events: none; z-index: 1;
            transition: background 0.5s ease;
        }

        /* Face */
        .face-container {
            display: flex; align-items: center;
            gap: clamp(12px, 4vw, 22px);
            position: relative; z-index: 2;
            transform: scale(clamp(1.1, 1.4, 1.6));
        }

        /* LED EYE */
        .led-eye {
            position: relative;
            width: clamp(80px, 28vw, 120px);
            height: clamp(80px, 28vw, 120px);
            display: flex; justify-content: center; align-items: center;
        }
        .eye-housing {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #151520, #08080e);
            box-shadow: 0 0 50px rgba(0,200,255,0.025), inset 0 0 30px rgba(0,0,0,0.95), 0 0 0 1px rgba(0,200,255,0.03);
            display: flex; justify-content: center; align-items: center;
        }
        .led-screen {
            width: 72%; height: 72%; border-radius: 50%;
            background: #06060a; position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9), 0 0 8px rgba(0,200,255,0.02);
        }
        .led-grid {
            position: absolute; inset: 0;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 6px, rgba(0,200,255,0.01) 6px, rgba(0,200,255,0.01) 7px),
                repeating-linear-gradient(90deg, transparent, transparent 6px, rgba(0,200,255,0.01) 6px, rgba(0,200,255,0.01) 7px);
            pointer-events: none;
        }
        .led-shape {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .led-dot {
            width: 16px; height: 16px; border-radius: 50%;
            background: #00e5ff;
            box-shadow: 0 0 10px rgba(0,229,255,0.6), 0 0 25px rgba(0,229,255,0.3), inset 0 0 4px rgba(255,255,255,0.3);
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.18s ease-out;
        }
        .led-bar {
            width: 42px; height: 5px; border-radius: 2.5px;
            background: #00e5ff;
            box-shadow: 0 0 8px rgba(0,229,255,0.5), 0 0 20px rgba(0,229,255,0.2), inset 0 0 3px rgba(255,255,255,0.2);
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .led-ring {
            position: absolute; inset: 10%;
            border-radius: 50%;
            border: 1.5px solid rgba(0,229,255,0.05);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        /* EXPRESSIONS */
        .led-shape.normal .led-dot { opacity: 1; transform: translate(-50%, -50%); }
        .led-shape.normal .led-bar { opacity: 0; transform: translate(-50%, -50%) scaleX(0); }

        .led-shape.happy .led-dot { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        .led-shape.happy .led-bar { opacity: 1; width: 38px; height: 9px; border-radius: 0 0 19px 19px; background: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.5), 0 0 25px rgba(0,255,136,0.25), inset 0 0 4px rgba(255,255,255,0.2); transform: translate(-50%, calc(-50% + 5px)); }

        .led-shape.sad .led-dot { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        .led-shape.sad .led-bar { opacity: 1; width: 34px; height: 9px; border-radius: 17px 17px 0 0; background: #4488ff; box-shadow: 0 0 10px rgba(68,136,255,0.5), 0 0 25px rgba(68,136,255,0.25), inset 0 0 4px rgba(255,255,255,0.2); transform: translate(-50%, calc(-50% - 5px)); }

        .led-shape.angry .led-dot { opacity: 1; width: 10px; height: 10px; background: #ff3344; box-shadow: 0 0 10px rgba(255,51,68,0.6), 0 0 25px rgba(255,51,68,0.3), inset 0 0 3px rgba(255,255,255,0.2); transform: translate(-50%, -50%); }
        .led-shape.angry .led-bar { opacity: 1; width: 40px; height: 3px; border-radius: 1.5px; background: #ff3344; box-shadow: 0 0 8px rgba(255,51,68,0.5), 0 0 20px rgba(255,51,68,0.2), inset 0 0 3px rgba(255,255,255,0.15); transform: translate(-50%, calc(-50% - 10px)); }

        .led-shape.surprised .led-dot { opacity: 1; width: 30px; height: 30px; background: #00ccff; box-shadow: 0 0 15px rgba(0,204,255,0.6), 0 0 40px rgba(0,204,255,0.3), inset 0 0 6px rgba(255,255,255,0.3); transform: translate(-50%, -50%); }
        .led-shape.surprised .led-bar { opacity: 0; transform: translate(-50%, -50%) scaleX(0); }

        .led-shape.love .led-dot { opacity: 1; width: 12px; height: 12px; background: #ff66aa; box-shadow: 0 0 10px rgba(255,102,170,0.6), 0 0 25px rgba(255,102,170,0.3), inset 0 0 3px rgba(255,255,255,0.2); transform: translate(-50%, -50%); }
        .led-shape.love .led-bar { opacity: 1; width: 32px; height: 14px; border-radius: 0 0 16px 16px; background: #ff66aa; box-shadow: 0 0 10px rgba(255,102,170,0.5), 0 0 25px rgba(255,102,170,0.25), inset 0 0 4px rgba(255,255,255,0.2); transform: translate(-50%, calc(-50% + 3px)); }

        .led-shape.sleepy .led-dot { opacity: 0.2; width: 8px; height: 8px; background: #557799; box-shadow: 0 0 4px rgba(85,119,153,0.25), 0 0 10px rgba(85,119,153,0.08); transform: translate(-50%, -50%); }
        .led-shape.sleepy .led-bar { opacity: 0; transform: translate(-50%, -50%) scaleX(0); }

        .led-shape.squint .led-dot { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        .led-shape.squint .led-bar { opacity: 1; width: 38px; height: 3px; border-radius: 1.5px; background: #ffaa00; box-shadow: 0 0 8px rgba(255,170,0,0.5), 0 0 20px rgba(255,170,0,0.2), inset 0 0 3px rgba(255,255,255,0.15); transform: translate(-50%, -50%); }

        .led-shape.thinking .led-dot { opacity: 1; width: 10px; height: 10px; background: #aa88ff; box-shadow: 0 0 8px rgba(170,136,255,0.5), 0 0 20px rgba(170,136,255,0.25), inset 0 0 3px rgba(255,255,255,0.15); transform: translate(calc(-50% + 10px), calc(-50% - 8px)); }
        .led-shape.thinking .led-bar { opacity: 1; width: 22px; height: 4px; border-radius: 2px; background: #aa88ff; box-shadow: 0 0 6px rgba(170,136,255,0.4), 0 0 15px rgba(170,136,255,0.18), inset 0 0 3px rgba(255,255,255,0.15); transform: translate(calc(-50% - 5px), calc(-50% + 10px)) rotate(-12deg); }

        .led-shape.confused .led-dot { opacity: 1; width: 8px; height: 8px; background: #ff8844; box-shadow: 0 0 8px rgba(255,136,68,0.5), 0 0 20px rgba(255,136,68,0.25), inset 0 0 2px rgba(255,255,255,0.15); transform: translate(-50%, -50%); }
        .led-shape.confused .led-bar { opacity: 1; width: 34px; height: 4px; border-radius: 2px; background: #ff8844; box-shadow: 0 0 6px rgba(255,136,68,0.4), 0 0 15px rgba(255,136,68,0.18), inset 0 0 3px rgba(255,255,255,0.15); transform: translate(-50%, -50%) rotate(18deg); }

        .led-shape.neutral .led-dot { opacity: 1; width: 6px; height: 6px; background: #88aabb; box-shadow: 0 0 5px rgba(136,170,187,0.35), 0 0 12px rgba(136,170,187,0.12); transform: translate(calc(-50% - 10px), calc(-50% - 2px)); }
        .led-shape.neutral .led-bar { opacity: 1; width: 28px; height: 3px; border-radius: 1.5px; background: #88aabb; box-shadow: 0 0 5px rgba(136,170,187,0.35), 0 0 12px rgba(136,170,187,0.12), inset 0 0 2px rgba(255,255,255,0.1); transform: translate(calc(-50% + 6px), calc(-50% - 2px)); }

        .led-shape.shock .led-dot { opacity: 1; width: 22px; height: 22px; background: #ffffff; box-shadow: 0 0 12px rgba(255,255,255,0.5), 0 0 30px rgba(255,255,255,0.2), inset 0 0 5px rgba(200,240,255,0.3); transform: translate(-50%, -50%); }
        .led-shape.shock .led-bar { opacity: 0; transform: translate(-50%, -50%) scaleX(0); }

        .led-shape.excited .led-dot { opacity: 1; width: 14px; height: 14px; background: #ffdd00; box-shadow: 0 0 12px rgba(255,221,0,0.6), 0 0 30px rgba(255,221,0,0.3), inset 0 0 4px rgba(255,255,255,0.3); transform: translate(-50%, -50%); }
        .led-shape.excited .led-bar { opacity: 1; width: 42px; height: 10px; border-radius: 0 0 21px 21px; background: #ffdd00; box-shadow: 0 0 10px rgba(255,221,0,0.5), 0 0 25px rgba(255,221,0,0.25), inset 0 0 4px rgba(255,255,255,0.2); transform: translate(-50%, calc(-50% + 6px)); }

        .led-shape.worried .led-dot { opacity: 1; width: 8px; height: 8px; background: #cc88ff; box-shadow: 0 0 6px rgba(204,136,255,0.45), 0 0 15px rgba(204,136,255,0.18); transform: translate(-50%, calc(-50% + 4px)); }
        .led-shape.worried .led-bar { opacity: 1; width: 32px; height: 3px; border-radius: 1.5px; background: #cc88ff; box-shadow: 0 0 5px rgba(204,136,255,0.35), 0 0 12px rgba(204,136,255,0.12), inset 0 0 2px rgba(255,255,255,0.1); transform: translate(-50%, calc(-50% - 8px)) rotate(-5deg); }

        .led-shape.blink .led-dot { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        .led-shape.blink .led-bar { opacity: 1; width: 46px; height: 3px; border-radius: 1.5px; background: #00e5ff; box-shadow: 0 0 6px rgba(0,229,255,0.4), 0 0 15px rgba(0,229,255,0.15), inset 0 0 2px rgba(255,255,255,0.15); transform: translate(-50%, -50%); }

        .led-shape.wink .led-dot { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        .led-shape.wink .led-bar { opacity: 1; width: 38px; height: 3px; border-radius: 1.5px; background: #00e5ff; box-shadow: 0 0 5px rgba(0,229,255,0.35), 0 0 12px rgba(0,229,255,0.12), inset 0 0 2px rgba(255,255,255,0.1); transform: translate(-50%, -50%); }

        /* MOUTH */
        .mouth {
            position: absolute; bottom: clamp(-50px, -12vw, -40px);
            left: 50%; transform: translateX(-50%);
            width: 22px; height: 4px; border-radius: 2px;
            background: rgba(0,229,255,0.1);
            box-shadow: 0 0 8px rgba(0,229,255,0.06);
            transition: all 0.3s ease;
        }
        .mouth.smile { width: 30px; height: 10px; border-radius: 0 0 15px 15px; background: rgba(0,255,136,0.08); border-bottom: 2px solid rgba(0,255,136,0.18); box-shadow: 0 0 10px rgba(0,255,136,0.06); }
        .mouth.frown { width: 26px; height: 8px; border-radius: 13px 13px 0 0; background: rgba(68,136,255,0.06); border-top: 2px solid rgba(68,136,255,0.15); box-shadow: 0 0 8px rgba(68,136,255,0.04); }
        .mouth.o { width: 12px; height: 18px; border-radius: 50%; background: rgba(0,204,255,0.08); border: 2px solid rgba(0,204,255,0.15); box-shadow: 0 0 10px rgba(0,204,255,0.04); }
        .mouth.line { width: 18px; height: 2px; border-radius: 1px; background: rgba(255,51,68,0.18); box-shadow: 0 0 6px rgba(255,51,68,0.04); }
        .mouth.grin { width: 34px; height: 12px; border-radius: 0 0 17px 17px; background: rgba(0,255,136,0.05); border-bottom: 2px solid rgba(0,255,136,0.15); }
        .mouth.neutral { width: 20px; height: 2px; border-radius: 1px; background: rgba(136,170,187,0.12); }

        /* STATUS */
        .status {
            position: fixed; top: clamp(30px, 8vh, 50px); left: 50%;
            transform: translateX(-50%);
            color: rgba(0,229,255,0.15); font-size: 10px;
            letter-spacing: 4px; text-transform: uppercase;
            z-index: 10; transition: opacity 0.3s;
        }
        .status.hidden { opacity: 0; }

        /* HINT - auto hide */
        .hint {
            position: fixed; bottom: clamp(30px, 8vh, 50px); left: 50%;
            transform: translateX(-50%);
            color: rgba(0,229,255,0.1); font-size: 9px;
            letter-spacing: 1.5px; text-align: center;
            z-index: 10; line-height: 2;
            transition: opacity 0.5s;
        }
        .hint.hidden { opacity: 0; pointer-events: none; }

        .corner {
            position: fixed; width: 25px; height: 25px;
            border-color: rgba(0,229,255,0.06); border-style: solid;
            pointer-events: none; z-index: 5;
        }
        .c-tl { top: 15px; left: 15px; border-width: 1.5px 0 0 1.5px; }
        .c-tr { top: 15px; right: 15px; border-width: 1.5px 1.5px 0 0; }
        .c-bl { bottom: 15px; left: 15px; border-width: 0 0 1.5px 1.5px; }
        .c-br { bottom: 15px; right: 15px; border-width: 0 1.5px 1.5px 0; }

        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.005); } }
        .breathing { animation: breathe 5s ease-in-out infinite; }

        @keyframes twitch { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(1px, -1px); } 75% { transform: translate(-1px, 1px); } }
        .twitch { animation: twitch 0.15s ease-in-out 2; }

        @keyframes boot-up { 0% { opacity: 0; transform: scale(0.5); } 60% { opacity: 1; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
        .booting { animation: boot-up 0.8s ease-out forwards; }
    </style>
</head>
<body>
    <!-- REACTION OVERLAYS -->
    <div class="reaction-overlay reaction-shock" id="overlay-shock">
        <div class="reaction-emoji">😱</div>
        <div class="reaction-text">CHOQUE!</div>
    </div>
    <div class="reaction-overlay reaction-celebrate" id="overlay-celebrate">
        <div class="reaction-emoji">🎉</div>
        <div class="reaction-text">FESTA!</div>
    </div>
    <div class="reaction-overlay reaction-love" id="overlay-love">
        <div class="reaction-emoji">🥰</div>
        <div class="reaction-text">AMOR!</div>
    </div>
    <div class="reaction-overlay reaction-scared" id="overlay-scared">
        <div class="reaction-emoji">😰</div>
        <div class="reaction-text">ASSUSTADO!</div>
    </div>
    <div class="reaction-overlay reaction-sleep" id="overlay-sleep">
        <div class="zzz">Z</div>
        <div class="zzz">z</div>
        <div class="zzz">Z</div>
        <div class="reaction-emoji">😴</div>
        <div class="reaction-text">SONO</div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="ambient-glow" id="ambient"></div>

    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <div class="status" id="status">ROBO ONLINE</div>

    <div class="face-container breathing" id="face">
        <div class="led-eye" id="eye-left">
            <div class="eye-housing">
                <div class="led-screen">
                    <div class="led-grid"></div>
                    <div class="led-ring" id="ring-left"></div>
                    <div class="led-shape normal" id="shape-left">
                        <div class="led-dot"></div>
                        <div class="led-bar"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="led-eye" id="eye-right">
            <div class="eye-housing">
                <div class="led-screen">
                    <div class="led-grid"></div>
                    <div class="led-ring" id="ring-right"></div>
                    <div class="led-shape normal" id="shape-right">
                        <div class="led-dot"></div>
                        <div class="led-bar"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="mouth" id="mouth"></div>
    </div>

    <div class="hint" id="hint">
        TOQUE NOS OLHOS &middot; DESLIZA PRA MUDAR<br>
        TOQUE DUPLO = SONO &middot; SHAKE = SURPRESA
    </div>

    <script>
        // ===== AUDIO =====
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let masterGain = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioCtx();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.5;
                masterGain.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, dur, type = 'sine', vol = 0.035) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain || audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            filter.type = 'lowpass';
            filter.frequency.value = 3000;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + dur);
        }

        function playChord(freqs, dur, vol = 0.02) {
            freqs.forEach((f, i) => setTimeout(() => playTone(f, dur, 'sine', vol), i * 50));
        }

        function playBlink() {
            playTone(900, 0.035, 'sine', 0.018);
            setTimeout(() => playTone(700, 0.035, 'sine', 0.015), 70);
        }

        function playBoot() {
            [200, 300, 400, 500, 600].forEach((f, i) => setTimeout(() => playTone(f, 0.1 + i * 0.02, 'sine', 0.03), i * 100));
        }

        function playExpressionSound(name) {
            const sounds = {
                normal: () => playTone(440, 0.08),
                happy: () => playChord([523, 659], 0.12, 0.018),
                sad: () => { playTone(330, 0.15); setTimeout(() => playTone(262, 0.15), 120); },
                angry: () => playTone(100, 0.2, 'sawtooth', 0.04),
                surprised: () => { playTone(440, 0.02); setTimeout(() => playTone(880, 0.1), 30); },
                love: () => playChord([523, 659, 784], 0.15, 0.015),
                sleepy: () => playTone(150, 0.3, 'sine', 0.012),
                squint: () => playTone(240, 0.12, 'triangle', 0.025),
                thinking: () => { playTone(330, 0.08); setTimeout(() => playTone(392, 0.08), 100); },
                confused: () => { playTone(400, 0.05); setTimeout(() => playTone(340, 0.05), 70); setTimeout(() => playTone(400, 0.06), 140); },
                neutral: () => playTone(350, 0.06),
                shock: () => { playTone(600, 0.03); setTimeout(() => playTone(1000, 0.08), 40); },
                excited: () => playChord([523, 659, 784, 1047], 0.1, 0.018),
                worried: () => { playTone(392, 0.1); setTimeout(() => playTone(349, 0.12), 100); },
            };
            if (sounds[name]) sounds[name]();
        }

        function playTouch() { playTone(1000 + Math.random() * 250, 0.025, 'sine', 0.012); }
        function playSwoosh() { playTone(550, 0.1, 'sine', 0.018); }

        // ===== VIBRATION =====
        function vibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }

        // ===== WAKE LOCK =====
        let wakeLock = null;
        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && wakeLock !== null) requestWakeLock();
        });

        function goFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        }

        // ===== CONFETTI =====
        const confettiCanvas = document.getElementById('confetti-canvas');
        const ctx = confettiCanvas.getContext('2d');
        let confettiParticles = [];
        let confettiActive = false;

        function resizeConfetti() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeConfetti);
        resizeConfetti();

        function spawnConfetti() {
            confettiParticles = [];
            const colors = ['#00ff88', '#00e5ff', '#ff66aa', '#ffdd00', '#ff3344', '#aa88ff'];
            for (let i = 0; i < 60; i++) {
                confettiParticles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: -20 - Math.random() * 100,
                    w: 4 + Math.random() * 5,
                    h: 4 + Math.random() * 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: 2 + Math.random() * 3,
                    drift: (Math.random() - 0.5) * 2,
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 8,
                });
            }
        }

        function drawConfetti() {
            if (!confettiActive) { ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height); return; }
            ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            let active = false;
            confettiParticles.forEach(p => {
                p.y += p.speed;
                p.x += p.drift;
                p.rotation += p.rotSpeed;
                if (p.y < confettiCanvas.height + 20) active = true;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            });
            if (active) requestAnimationFrame(drawConfetti);
            else { confettiActive = false; confettiCanvas.style.display = 'none'; }
        }

        function startConfetti() {
            confettiCanvas.style.display = 'block';
            spawnConfetti();
            confettiActive = true;
            drawConfetti();
        }

        // ===== REACTION OVERLAYS =====
        let reactionTimeout = null;
        let isInReaction = false;

        function showReaction(type, duration = 2000) {
            if (isInReaction) return;
            isInReaction = true;
            clearTimeout(reactionTimeout);

            const overlay = document.getElementById('overlay-' + type);
            if (!overlay) { isInReaction = false; return; }

            overlay.classList.add('active');
            vibrate([20, 30, 20]);

            if (type === 'celebrate') startConfetti();

            reactionTimeout = setTimeout(() => {
                overlay.classList.remove('active');
                isInReaction = false;
            }, duration);
        }

        // ===== EYE TRACKING =====
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let targetX = 0, targetY = 0, currentX = 0, currentY = 0;

        function updateTracking() {
            const leftEye = document.getElementById('eye-left').getBoundingClientRect();
            const maxOffset = 10;
            targetX = Math.max(-maxOffset, Math.min(maxOffset, (mouseX - (leftEye.left + leftEye.width / 2)) / 10));
            targetY = Math.max(-maxOffset, Math.min(maxOffset, (mouseY - (leftEye.top + leftEye.height / 2)) / 10));
            currentX += (targetX - currentX) * 0.12;
            currentY += (targetY - currentY) * 0.12;
            const tx = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px))`;
            document.getElementById('shape-left').style.transform = tx;
            document.getElementById('shape-right').style.transform = tx;
            requestAnimationFrame(updateTracking);
        }

        document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        document.addEventListener('touchmove', e => { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }, { passive: true });
        document.addEventListener('touchstart', e => { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }, { passive: true });
        updateTracking();

        // ===== EXPRESSIONS =====
        const expressions = {
            normal: { name: 'NORMAL', shape: 'normal', mouth: '', ring: 'rgba(0,229,255,0.05)', ambient: 'rgba(0,200,255,0.02)' },
            happy: { name: 'FELIZ', shape: 'happy', mouth: 'smile', ring: 'rgba(0,255,136,0.08)', ambient: 'rgba(0,255,136,0.02)' },
            sad: { name: 'TRISTE', shape: 'sad', mouth: 'frown', ring: 'rgba(68,136,255,0.06)', ambient: 'rgba(68,136,255,0.015)' },
            angry: { name: 'BRAVO', shape: 'angry', mouth: 'line', ring: 'rgba(255,51,68,0.06)', ambient: 'rgba(255,51,68,0.015)' },
            surprised: { name: 'SURPRESO', shape: 'surprised', mouth: 'o', ring: 'rgba(0,204,255,0.08)', ambient: 'rgba(0,204,255,0.02)' },
            love: { name: 'AMOR', shape: 'love', mouth: 'smile', ring: 'rgba(255,102,170,0.08)', ambient: 'rgba(255,102,170,0.02)' },
            sleepy: { name: 'SONO', shape: 'sleepy', mouth: '', ring: 'rgba(85,119,153,0.03)', ambient: 'rgba(85,119,153,0.008)' },
            squint: { name: 'DESCONFIADO', shape: 'squint', mouth: 'line', ring: 'rgba(255,170,0,0.06)', ambient: 'rgba(255,170,0,0.015)' },
            thinking: { name: 'PENSANDO', shape: 'thinking', mouth: 'line', ring: 'rgba(170,136,255,0.06)', ambient: 'rgba(170,136,255,0.015)' },
            confused: { name: 'CONFUSO', shape: 'confused', mouth: 'o', ring: 'rgba(255,136,68,0.06)', ambient: 'rgba(255,136,68,0.015)' },
            neutral: { name: 'MEH', shape: 'neutral', mouth: 'neutral', ring: 'rgba(136,170,187,0.04)', ambient: 'rgba(136,170,187,0.01)' },
            shock: { name: 'CHOQUE', shape: 'shock', mouth: 'o', ring: 'rgba(255,255,255,0.06)', ambient: 'rgba(255,255,255,0.015)' },
            excited: { name: 'ANIMADO', shape: 'excited', mouth: 'grin', ring: 'rgba(255,221,0,0.08)', ambient: 'rgba(255,221,0,0.02)' },
            worried: { name: 'PREOCUPADO', shape: 'worried', mouth: 'frown', ring: 'rgba(204,136,255,0.06)', ambient: 'rgba(204,136,255,0.015)' },
        };

        let currentExpr = 'normal';
        let exprKeys = Object.keys(expressions);
        let exprIndex = 0;

        function setExpression(key) {
            const expr = expressions[key];
            if (!expr) return;
            currentExpr = key;
            document.getElementById('status').textContent = expr.name;
            document.getElementById('shape-left').className = 'led-shape ' + expr.shape;
            document.getElementById('shape-right').className = 'led-shape ' + expr.shape;
            document.getElementById('ring-left').style.borderColor = expr.ring;
            document.getElementById('ring-right').style.borderColor = expr.ring;
            document.getElementById('ambient').style.background = `radial-gradient(ellipse, ${expr.ambient}, transparent 70%)`;
            document.getElementById('mouth').className = 'mouth ' + expr.mouth;
            playExpressionSound(key);
            vibrate(15);
        }

        // ===== BLINK =====
        function blink() {
            if (currentExpr === 'sleepy' || isInReaction) return;
            const leftShape = document.getElementById('shape-left');
            const rightShape = document.getElementById('shape-right');
            playBlink();
            vibrate(5);
            const savedClass = 'led-shape ' + expressions[currentExpr].shape;
            leftShape.className = 'led-shape blink';
            rightShape.className = 'led-shape blink';
            setTimeout(() => {
                if (currentExpr !== 'sleepy') {
                    leftShape.className = savedClass;
                    rightShape.className = savedClass;
                }
            }, 100);
            setTimeout(blink, 2000 + Math.random() * 3000);
        }

        // ===== WINK =====
        function wink(side) {
            if (isInReaction) return;
            playBlink();
            vibrate(8);
            const shape = document.getElementById('shape-' + side);
            const savedClass = 'led-shape ' + expressions[currentExpr].shape;
            shape.className = 'led-shape wink';
            setTimeout(() => { shape.className = savedClass; }, 200);
        }

        // ===== INTERACTION STATE =====
        let longPressTimer = null;
        let isLongPress = false;
        let isRapidCycling = false;
        let rapidInterval = null;

        function stopRapidCycle() {
            if (rapidInterval) { clearInterval(rapidInterval); rapidInterval = null; }
            isRapidCycling = false;
        }

        // Eye touch handlers
        ['left', 'right'].forEach(side => {
            const eye = document.getElementById('eye-' + side);

            eye.addEventListener('touchstart', e => {
                initAudio();
                requestWakeLock();
                goFullscreen();
                e.preventDefault();
                isLongPress = false;
                playTouch();
                vibrate(10);

                longPressTimer = setTimeout(() => {
                    isLongPress = true;
                    isRapidCycling = true;
                    let rapidIndex = exprIndex;
                    rapidInterval = setInterval(() => {
                        rapidIndex = (rapidIndex + 1) % exprKeys.length;
                        setExpression(exprKeys[rapidIndex]);
                        vibrate(5);
                    }, 250);
                }, 500);

                if (currentExpr === 'sleepy') {
                    setTimeout(() => setExpression('surprised'), 100);
                    setTimeout(() => setExpression('normal'), 600);
                }
            }, { passive: false });

            eye.addEventListener('touchend', e => {
                clearTimeout(longPressTimer);
                stopRapidCycle();
                if (!isLongPress && !isInReaction) wink(side);
            });

            eye.addEventListener('click', () => { initAudio(); if (!isInReaction) wink(side); });

            // Petting
            let touchStartY = 0;
            eye.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
            eye.addEventListener('touchmove', e => {
                const dy = e.touches[0].clientY - touchStartY;
                if (Math.abs(dy) > 25 && !isInReaction) {
                    playTouch();
                    vibrate(8);
                    if (currentExpr !== 'happy' && currentExpr !== 'love') {
                        setExpression('love');
                        setTimeout(() => setExpression('happy'), 800);
                    }
                }
            }, { passive: true });
        });

        // ===== SWIPE TO CHANGE EXPRESSION =====
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        }, { passive: true });

        document.addEventListener('touchend', e => {
            const t = e.changedTouches[0];
            const dx = t.clientX - touchStartX;
            const dy = t.clientY - touchStartY;
            const dt = Date.now() - touchStartTime;

            // Only process as swipe if not a long press and quick enough
            if (dt < 400 && Math.abs(dx) > 50 && Math.abs(dy) < 80 && !isInReaction && !isRapidCycling) {
                initAudio();
                requestWakeLock();
                goFullscreen();
                if (dx > 0) exprIndex = (exprIndex + 1) % exprKeys.length;
                else exprIndex = (exprIndex - 1 + exprKeys.length) % exprKeys.length;
                playSwoosh();
                vibrate(12);
                setExpression(exprKeys[exprIndex]);
            }
        }, { passive: true });

        // ===== DOUBLE TAP = SLEEP/WAKE =====
        let lastTap = 0;
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if (now - lastTap < 300 && !isInReaction) {
                initAudio();
                requestWakeLock();
                goFullscreen();
                vibrate(25);
                if (currentExpr === 'sleepy') {
                    playBoot();
                    setExpression('surprised');
                    setTimeout(() => setExpression('normal'), 500);
                } else {
                    setExpression('sleepy');
                    showReaction('sleep', 2500);
                }
            }
            lastTap = now;
        }, { passive: true });

        // ===== SHAKE =====
        let lastShakeX = 0, lastShakeY = 0, lastShakeZ = 0;
        let shakeCooldown = false;
        if (window.DeviceMotionEvent) {
            window.addEventListener('devicemotion', e => {
                const acc = e.accelerationIncludingGravity;
                if (!acc) return;
                const delta = Math.abs(acc.x - lastShakeX) + Math.abs(acc.y - lastShakeY) + Math.abs(acc.z - lastShakeZ);
                if (delta > 15 && !shakeCooldown && !isInReaction) {
                    shakeCooldown = true;
                    initAudio();
                    vibrate([30, 50, 30]);
                    setExpression('surprised');
                    showReaction('shock', 2000);
                    setTimeout(() => setExpression('normal'), 2500);
                    setTimeout(() => { shakeCooldown = false; }, 3000);
                }
                lastShakeX = acc.x; lastShakeY = acc.y; lastShakeZ = acc.z;
            }, { passive: true });
        }

        // ===== KEYBOARD =====
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') { exprIndex = (exprIndex + 1) % exprKeys.length; setExpression(exprKeys[exprIndex]); }
            else if (e.key === 'ArrowLeft') { exprIndex = (exprIndex - 1 + exprKeys.length) % exprKeys.length; setExpression(exprKeys[exprIndex]); }
            else if (e.key === ' ') { blink(); vibrate(8); }
            else if (e.key === 'w') { wink('left'); }
            else if (e.key === 'e') { wink('right'); }
            else if (e.key === 's') { setExpression('sleepy'); showReaction('sleep', 2500); }
            else if (e.key === 'f') { goFullscreen(); requestWakeLock(); }
        });

        // ===== RANDOM EXPRESSIONS (only when idle) =====
        let lastInteract = Date.now();
        const updateInteract = () => { lastInteract = Date.now(); };
        document.addEventListener('touchstart', updateInteract, { passive: true });
        document.addEventListener('click', updateInteract);
        document.addEventListener('mousemove', updateInteract);
        document.addEventListener('keydown', updateInteract);

        let randomExprTimer = null;
        function scheduleRandomExpression() {
            const delay = 8000 + Math.random() * 7000; // 8-15s
            randomExprTimer = setTimeout(() => {
                if (Date.now() - lastInteract > 8000 && !isInReaction && currentExpr !== 'sleepy') {
                    const randomExpr = exprKeys[Math.floor(Math.random() * exprKeys.length)];
                    if (randomExpr !== currentExpr) {
                        setExpression(randomExpr);
                        exprIndex = exprKeys.indexOf(randomExpr);
                    }
                }
                scheduleRandomExpression();
            }, delay);
        }

        // ===== RANDOM TWITCH =====
        function randomTwitch() {
            if (Math.random() > 0.65 && currentExpr === 'normal' && !isInReaction) {
                const eye = document.getElementById('eye-' + (Math.random() > 0.5 ? 'left' : 'right'));
                eye.classList.add('twitch');
                setTimeout(() => eye.classList.remove('twitch'), 300);
            }
            setTimeout(randomTwitch, 3000 + Math.random() * 6000);
        }

        // ===== HINT AUTO-HIDE =====
        setTimeout(() => { document.getElementById('hint').classList.add('hidden'); }, 8000);

        // ===== BOOT =====
        function bootSequence() {
            const face = document.getElementById('face');
            face.style.opacity = '0';
            face.style.transform = 'scale(0.3)';
            setTimeout(() => {
                face.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                face.style.opacity = '1';
                face.style.transform = 'scale(1.3)';
                playBoot();
                vibrate([40, 80, 40]);
            }, 200);
            setTimeout(() => { face.style.transition = ''; setExpression('normal'); }, 1200);
        }

        // ===== INIT =====
        document.addEventListener('touchstart', () => { initAudio(); requestWakeLock(); goFullscreen(); }, { once: true });
        document.addEventListener('click', () => { initAudio(); requestWakeLock(); goFullscreen(); }, { once: true });

        bootSequence();
        setTimeout(blink, 2000);
        setTimeout(randomTwitch, 3000);
        scheduleRandomExpression();
    </script>
</body>
</html>
